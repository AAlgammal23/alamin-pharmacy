name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📂 Create app keystore dir
        run: mkdir -p app

      - name: 🔑 Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AlAmin Pharmacy,O=AlAmin,C=YE"

      - name: 📝 Create keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          storeFile=app/debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: 🔑 Setup google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "✅ google-services.json configured from secret"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set. App will not connect to Firebase."
            echo "ℹ️ To enable Firebase, add your google-services.json as a GitHub secret named GOOGLE_SERVICES_JSON"
          fi

      - name: 🔨 Setup Gradle wrapper
        run: |
          chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 🏗️ Build Debug APK (fallback)
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: alamin-pharma-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: alamin-pharma-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn
