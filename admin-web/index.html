<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>صيدلية الأمين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { 
            background: #f4fbf9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Tajawal', sans-serif;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 20px;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .btn-primary {
            background: #1FBFB0;
            border-color: #1FBFB0;
            padding: 12px;
            font-size: 18px;
        }
        .btn-primary:hover {
            background: #1aa89a;
            border-color: #1aa89a;
        }
        .form-control {
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
        }
        h2 {
            color: #0f2a2e;
            font-weight: 700;
        }
        #login-error {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-4">🔐 تسجيل الدخول</h2>
        <p class="text-center text-muted mb-4">صيدلية الأمين الحديثة</p>
        
        <input type="email" id="email" class="form-control mb-3" placeholder="البريد الإلكتروني" value="admin@alamin.com">
        <input type="password" id="password" class="form-control mb-3" placeholder="كلمة المرور" value="123456789">
        
        <button id="login-btn" class="btn btn-primary w-100">🚀 دخول</button>
        <div id="login-error" class="text-danger mt-2 text-center"></div>
        
        <hr class="my-4">
        <p class="text-center text-muted small">
            ⚡ جرب: admin@alamin.com / 123456789
        </p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
        }
    }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword } from "firebase/auth";

        const firebaseConfig = {
            apiKey: "AIzaSyAhl8TvXaE2sm8VkH2TTljVdsqmdcC2Afs",
            authDomain: "alamin-pharma.firebaseapp.com",
            projectId: "alamin-pharma",
            storageBucket: "alamin-pharma.firebasestorage.app",
            messagingSenderId: "773527249793",
            appId: "1:773527249793:web:87e12e986e7cf72cb73e80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("login-btn").onclick = async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("login-error");
            
            errorDiv.textContent = "⏳ جاري تسجيل الدخول...";
            errorDiv.style.color = "#1FBFB0";
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                errorDiv.textContent = "✅ تم الدخول بنجاح!";
                errorDiv.style.color = "green";
                
                // عرض لوحة تحكم مبسطة
                document.body.innerHTML = `
                    <div style="text-align:center;padding:40px;background:#f4fbf9;min-height:100vh;">
                        <div style="background:white;border-radius:16px;padding:30px;max-width:500px;margin:auto;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                            <h1 style="color:#1FBFB0;">✅ مرحباً!</h1>
                            <p style="font-size:18px;color:#0f2a2e;">تم تسجيل الدخول بنجاح</p>
                            <p class="text-muted">${email}</p>
                            <button onclick="location.reload()" class="btn btn-outline-danger">خروج</button>
                        </div>
                    </div>
                `;
            } catch (e) {
                let msg = e.message;
                if (msg.includes("user-not-found")) msg = "❌ المستخدم غير موجود";
                else if (msg.includes("wrong-password")) msg = "❌ كلمة المرور خاطئة";
                else if (msg.includes("invalid-email")) msg = "❌ البريد الإلكتروني غير صحيح";
                else msg = "❌ " + msg;
                
                errorDiv.textContent = msg;
                errorDiv.style.color = "red";
            }
        };
    </script>
</body>
</html>
